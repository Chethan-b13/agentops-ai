id: K8S-002

name: Pod ImagePullBackOff

description: |
  New deployment pods are failing to start, staying in ImagePullBackOff state,
  because the deployment spec points to a non-existent image version in the registry.

tags:
  - kubernetes
  - deployment-failure
  - imagepullbackoff
  - container-registry

difficulty: medium

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "Image pull failure due to missing tag v2.5.9 in container registry"

incident:
  service: notification-service
  severity: high
  region: us-east-1

evidence:
  logs:
    - "Failed to pull image 'registry.internal/notify:v2.5.9': rpc error: code = Unknown desc = Error response from daemon: manifest for registry.internal/notify:v2.5.9 not found"
    - "Error: ImagePullBackOff"
    - "Failed to resolve image tag"

  metrics:
    cpu: 0
    memory: 0
    pod_status: "ImagePullBackOff"

expected_outputs:

  triage:
    severity: high
    category: kubernetes
    owner: release-engineering-team

  rca:
    root_cause: Pod ImagePullBackOff due to deployment reference to a non-existent image tag (v2.5.9) in the private container registry.

  remediation:
    - Push the correct Docker image with tag v2.5.9 to the private registry
    - Rollback deployment to the previous stable working version
    - Fix registry upload step in CI/CD pipeline script

  validation:
    passed: true
