id: RD-003

name: Redis Service Down

description: |
  The Redis database instance is down or unreachable, causing connection
  refused errors and failing requests in the authentication service.

tags:
  - redis
  - infrastructure
  - downtime
  - outage

difficulty: medium

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "Redis container/service failure causing auth gateway errors"

incident:
  service: auth-api
  severity: critical
  region: us-east-1
  metric_name: ErrorRate
  threshold: 5
  current_value: 15

evidence:
  logs:
    - "Redis connection lost to redis-master.internal:6379"
    - "ConnectionRefusedError: [Errno 111] Connection refused"
    - "Cannot resolve or connect to redis cluster endpoint"

  metrics:
    cpu: 15
    memory: 40
    redis_connected_clients: 0
    error_rate: 15
    request_latency_ms: 5000

expected_outputs:

  triage:
    severity: critical
    category: redis
    owner: platform-infra-team

  rca:
    root_cause: Redis master is down or unreachable, causing connection refused errors and complete loss of connectivity from the auth-api service.

  remediation:
    - Verify Redis container status and restart the daemon/service
    - Investigate cluster health and logs for memory limits/panic reasons
    - Implement fallback gracefully (circuit-breaker) to continue authentication without cache

  validation:
    passed: true
