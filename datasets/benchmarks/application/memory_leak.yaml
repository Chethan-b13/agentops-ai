id: APP-001

name: Application Memory Leak

description: |
  The image-processor service memory utilization increases steadily over time,
  leading to frequent garbage collection blocks and eventually crashing due to out-of-memory.

tags:
  - application
  - memory-leak
  - gc-pause
  - nodejs

difficulty: medium

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "Buffer cache memory leak in Node.js image processing application"

incident:
  service: image-processor
  severity: high
  region: us-east-1
  metric_name: MemoryGrowthBytesPerSec
  threshold: 1
  current_value: 154000

evidence:
  logs:
    - "Garbage collection took 8500ms"
    - "Warning: memory usage near limit (92%)"
    - "Critical: Heap memory limit close to exhaustion (allocating buffer)"
    - "FATAL ERROR: Ineffective mark-compacts near heap limit Allocation failed - JavaScript heap out of memory"

  metrics:
    cpu: 65
    memory: 98
    memory_growth_bytes_per_sec: 154000
    heap_used_mb: 1850
    request_latency_ms: 9200

expected_outputs:

  triage:
    severity: high
    category: application
    owner: image-processor-team

  rca:
    root_cause: A memory leak in the node image processing buffer cache where processed image binary data is not garbage collected.

  remediation:
    - Restart image-processor pods to restore memory levels immediately
    - Modify the node buffer processing pipeline to ensure cache release or scope cleanup
    - Profile application heap memory using heapdumps to track lingering references

  validation:
    passed: true
