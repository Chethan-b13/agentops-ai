id: DB-003

name: Missing Database Index

description: |
  A high-throughput query on the users table is causing full table scans,
  resulting in elevated database CPU and request latency for user profiles.

tags:
  - database
  - postgres
  - performance
  - missing-index

difficulty: medium

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "Query on non-indexed email column causing table scans"

incident:
  service: users-service
  severity: high
  region: us-east-1
  metric_name: DatabaseConnections
  threshold: 80
  current_value: 80

evidence:
  logs:
    - "duration: 4520 ms execute SELECT * FROM users WHERE email = 'user@example.com'"
    - "Filter: (email = 'user@example.com'::text)"
    - "Query plan indicates Seq Scan on users"

  metrics:
    cpu: 95
    memory: 50
    db_connections: 80
    request_latency_ms: 4520

expected_outputs:

  triage:
    severity: high
    category: database
    owner: users-service-team

  rca:
    root_cause: Missing database index on the email column of the users table causing sequential scans.

  remediation:
    - Create concurrent index on users(email)
    - Verify query plan uses index scan
    - Optimize caller service querying pattern

  validation:
    passed: true
