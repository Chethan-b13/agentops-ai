id: DB-001

name: Database Connection Pool Exhaustion

description: |
  The application is unable to acquire database connections because
  the PostgreSQL connection pool has been exhausted.

tags:
  - database
  - postgres
  - connection-pool
  - production

difficulty: medium

source: synthetic

version: 1

metadata:
  author: chethan
  created_at: "2026-06-29"
  notes: Initial benchmark

incident:
  service: payments-api
  severity: high
  region: us-east-1

evidence:
  logs:
    - "FATAL: remaining connection slots are reserved for non-replication superuser connections"
    - "sqlalchemy.exc.TimeoutError: QueuePool limit reached"

  metrics:
    cpu: 35
    memory: 52
    db_connections: 100
    request_latency_ms: 4500

expected_outputs:

  triage:
    severity: high
    category: database
    owner: payments-api-team

  rca:
    root_cause: PostgreSQL connection pool exhaustion

  remediation:
    - Increase connection pool size
    - Investigate connection leaks
    - Restart affected application pods

  validation:
    passed: true