id: DB-001

name: Database Connection Pool Exhaustion

description: |
  The application is unable to acquire database connections because
  the PostgreSQL connection pool has been exhausted.

tags:
  - database
  - postgres
  - connection-pool

difficulty: medium

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "PostgreSQL connection pool exhaustion incident"

incident:
  service: payments-api
  severity: high
  region: us-east-1
  metric_name: DatabaseConnections
  threshold: 80
  current_value: 100

evidence:
  logs:
    - "FATAL: remaining connection slots are reserved for non-replication superuser connections"
    - "sqlalchemy.exc.TimeoutError: QueuePool limit reached"

  metrics:
    cpu: 38
    memory: 55
    db_connections: 100
    request_latency_ms: 4200

expected_outputs:

  triage:
    severity: high
    category: database
    owner: payments-api-team

  rca:
    root_cause: PostgreSQL connection pool is fully exhausted — all 100 connections are in use — causing new application requests to time out waiting for an available connection slot.

  remediation:
    - Increase connection pool size
    - Investigate connection leaks
    - Restart affected application pods

  validation:
    passed: true