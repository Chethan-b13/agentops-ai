id: DB-004

name: PostgreSQL Deadlock

description: |
  Concurrent transactions are blocking each other,
  resulting in database deadlocks.

tags:
  - database
  - postgres
  - deadlock

difficulty: hard

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "PostgreSQL deadlock incident"

incident:
  service: orders-api
  severity: high
  region: us-east-1
  metric_name: DatabaseConnections
  threshold: 80
  current_value: 62

evidence:
  logs:
    - "ERROR: deadlock detected"
    - "DETAIL: Process 3124 waits for ShareLock"

  metrics:
    cpu: 46
    memory: 49
    db_connections: 62
    request_latency_ms: 6300

expected_outputs:

  triage:
    severity: high
    category: database
    owner: orders-api-team

  rca:
    root_cause: Two concurrent database transactions are deadlocked on a ShareLock, each waiting for the other to release its row lock, causing queries to fail and request latency to spike.

  remediation:
    - Retry aborted transactions
    - Reduce transaction scope
    - Ensure consistent lock ordering

  validation:
    passed: true