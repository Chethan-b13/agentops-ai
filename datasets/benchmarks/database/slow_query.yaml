id: DB-002

name: Slow SQL Query

description: |
  A poorly optimized SQL query is causing high request latency
  and excessive database CPU utilization.

tags:
  - database
  - postgres
  - slow-query

difficulty: medium

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "Slow SQL query due to sequence scan"

incident:
  service: payments-api
  severity: high
  region: us-east-1
  metric_name: DatabaseConnections
  threshold: 80
  current_value: 34

evidence:
  logs:
    - "duration: 8123 ms execute SELECT * FROM orders WHERE customer_id='123'"
    - "Seq Scan on orders"

  metrics:
    cpu: 91
    memory: 47
    db_connections: 34
    request_latency_ms: 8123

expected_outputs:

  triage:
    severity: high
    category: database
    owner: payments-api-team

  rca:
    root_cause: Missing database index causing slow SQL query

  remediation:
    - Add an index on customer_id
    - Analyze execution plan
    - Optimize the SQL query

  validation:
    passed: true