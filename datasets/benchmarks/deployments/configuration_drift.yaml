id: DEP-003

name: Configuration Drift

description: |
  A manual change in AWS IAM console (configuration drift) has deleted a policy
  attachment, causing immediate authorization failures on the next application execution.

tags:
  - deployments
  - configuration-drift
  - terraform
  - iam
  - permissions

difficulty: hard

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "Manual deletion of IAM policy causing DynamoDB access errors"

incident:
  service: inventory-api
  severity: high
  region: us-east-1

evidence:
  logs:
    - "AccessDeniedException: User arn:aws:iam::123456789012:user/inventory-app is not authorized to access table inventory-db"
    - "Unable to write inventory record: Permission denied"
    - "DynamoDB client error on BatchWriteItem"

  metrics:
    cpu: 10
    memory: 40
    db_write_errors: 180
    request_latency_ms: 35

expected_outputs:

  triage:
    severity: high
    category: deployments
    owner: security-ops-team

  rca:
    root_cause: IAM policy permissions for the inventory-app user have been removed or misconfigured, causing all DynamoDB BatchWriteItem calls to fail with AccessDeniedException.

  remediation:
    - Run Terraform apply to detect configuration drift and redeploy the IAM policy
    - Audit CloudTrail logs to identify the user/role that performed the manual change
    - Restrict manual modify/delete permissions on production IAM roles

  validation:
    passed: true
