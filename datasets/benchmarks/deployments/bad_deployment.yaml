id: DEP-001

name: Regression in Code Deployment

description: |
  A regression in recommendation-engine version v1.4.2 throws AttributeError errors,
  rendering the checkout recommendations block completely broken.

tags:
  - deployments
  - regression
  - rollout
  - bug

difficulty: medium

source: synthetic
version: 1

metadata:
  author: chethan
  created_at: "2026-06-30"
  notes: "Python syntax or logic regression introduced in tag v1.4.2"

incident:
  service: recommendation-engine
  severity: high
  region: us-east-1

evidence:
  logs:
    - "AttributeError: 'NoneType' object has no attribute 'get_items'"
    - "Process exited with code 1"
    - "HTTP/1.1 500 Internal Server Error on POST /recommendations"

  metrics:
    cpu: 5
    memory: 40
    deployment_version: "v1.4.2"
    error_rate: 98
    request_latency_ms: 15

expected_outputs:

  triage:
    severity: high
    category: deployments
    owner: recommendation-team

  rca:
    root_cause: A Python AttributeError regression introduced in v1.4.2 rollout causing recommendation request handler crashes.

  remediation:
    - Rollback recommendation-engine deployment to the last stable release v1.4.1
    - Fix the AttributeError in recommendation code and release v1.4.3
    - Add automated integration tests in CI/CD before promoting builds to production

  validation:
    passed: true
