[project]
name = "workflows"
version = "0.1.0"
requires-python = ">=3.12"

dependencies = [
    "langgraph",
    "shared",
    "agents",
    "langgraph-checkpoint-postgres>=3.1.0",
    "psycopg[binary]>=3.3.4",
]

[tool.uv.sources]
shared = { workspace = true }
agents = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
